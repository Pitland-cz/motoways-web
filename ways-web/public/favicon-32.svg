<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!--
    WAYS — Favicon 32×32
    Direction: V03 Navigation Route W
    At 32px: route line only, no glow, no waypoint markers
    Equal 1px visual margin all sides (stroke edge to viewBox edge):
      stroke-width=3.6 → half-stroke=1.8 → path at [2.8, 29.2] in both axes
      canonical 12,18→58,175→100,86→142,175→188,18
      scaled:    2.8,2.8 → 9.7,29.2 → 16,14.2 → 22.3,29.2 → 29.2,2.8
    WCAG: #c6ff00 on #1d1d1b = 14.4:1 (AAA)
  -->
  <rect width="32" height="32" fill="#1d1d1b"/>
  <polyline points="2.8,2.8 9.7,29.2 16,14.2 22.3,29.2 29.2,2.8"
    fill="none" stroke="#c6ff00" stroke-width="3.6"
    stroke-linejoin="round" stroke-linecap="round"/>
</svg>

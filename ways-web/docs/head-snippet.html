<!-- Motoways v3.0 — drop-in <head> block (paste into layout / _app / index.html) -->
<!-- All asset paths assume files are served from /public root. -->

<!-- Primary -->
<title>Motoways — Naplánuj průjezd, ne jen cíl.</title>
<meta name="description" content="Motoways: motorkářská navigace pro průjezd, ne jen cíl. Plánuj trasu se zatáčkami, panoramaty a flow.">
<meta name="theme-color" content="#0a0a0a">

<!-- Favicons -->
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/svg+xml" href="/favicon-dark.svg" media="(prefers-color-scheme: dark)">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="manifest" href="/site.webmanifest">
<meta name="msapplication-TileColor" content="#0a0a0a">
<meta name="msapplication-TileImage" content="/mstile-150x150.png">

<!-- Open Graph (Facebook, LinkedIn, generic) -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="Motoways">
<meta property="og:title" content="Motoways — Naplánuj průjezd, ne jen cíl.">
<meta property="og:description" content="Motorkářská navigace pro průjezd. Plánuj trasu se zatáčkami, panoramaty a flow.">
<meta property="og:url" content="https://www.motoways.cz/">
<meta property="og:image" content="https://www.motoways.cz/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:alt" content="Motoways — M-as-route logo">
<meta property="og:locale" content="cs_CZ">

<!-- Twitter / X -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:site" content="@motoways">
<meta name="twitter:title" content="Motoways — Naplánuj průjezd, ne jen cíl.">

<meta name="twitter:image" content="https://www.motoways.cz/twitter-card.png">
<meta name="twitter:image:alt" content="Motoways — M-as-route logo">

<!-- Fonts (Poppins display + Inter body + JetBrains Mono) -->

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

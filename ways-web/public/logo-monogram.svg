<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!--
    WAYS — Monogram / Standalone W Mark — DARK BACKGROUND
    Direction: V03 Navigation Route W (board approved 2026-05-03)
    v2: equal margins — polyline extremes 21.5px from each edge (all 4 sides)
    Usage: dark UI, app icon bg, social profile pic (dark), map overlay on dark tiles
    Colors: #c6ff00 route + glow | #1d1d1b bg
    Includes glow — remove for print and embroidery
    Minimum size: 40px (below 40px remove waypoint markers)
  -->
  <rect width="200" height="200" fill="#1d1d1b"/>

  <!-- Halo glow -->
  <polyline points="21.5,21.5 62.5,178.5 100,89.5 137.5,178.5 178.5,21.5"
    fill="none" stroke="#c6ff00" stroke-width="30"
    stroke-opacity="0.18" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Route main line -->
  <polyline points="21.5,21.5 62.5,178.5 100,89.5 137.5,178.5 178.5,21.5"
    fill="none" stroke="#c6ff00" stroke-width="13"
    stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Start ring -->
  <circle cx="21.5" cy="21.5" r="9.5" fill="#1d1d1b" stroke="#c6ff00" stroke-width="3.5"/>
  <!-- End ring -->
  <circle cx="178.5" cy="21.5" r="9.5" fill="#1d1d1b" stroke="#c6ff00" stroke-width="3.5"/>
  <!-- Peak waypoints — solid lime -->
  <circle cx="62.5"  cy="178.5" r="6.5" fill="#c6ff00"/>
  <circle cx="137.5" cy="178.5" r="6.5" fill="#c6ff00"/>
  <!-- Valley waypoint — hollow ring -->
  <circle cx="100"   cy="89.5"  r="8"   fill="#1d1d1b" stroke="#c6ff00" stroke-width="3.5"/>
</svg>
